# CI/CD pipeline. 

name: CI

on:
  pull_request:

  push:
    branches: [main]

# Serialize release builds: pushes to a given ref (main) run one at a time
# so concurrent release builds can't race over version numbers, changelogs,
# or the latest-release pointer. PR builds keep their own per-ref group and
# cancel superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  version:
    name: Create a version number
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      package: ${{ steps.version.outputs.package }}
      compiler: ${{ steps.compiler_version.outputs.compiler }}

    permissions:
      contents: read
      actions: read
      pull-requests: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: '0'

    # Compute the next version: the patch bump of the latest vX.Y.Z tag, unless
    # the checked-in VERSION file declares a higher minor/major floor (a marker
    # in a commit or PR body can no longer trigger a bump). Pull request builds
    # get a -beta.<run> prerelease so they never collide with a real release.
    # The action only reads the repo — it never tags or releases.
    - name: Determine the version
      id: version
      uses: degory/create-version@v1.0.0
      with:
        prerelease: ${{ github.event_name == 'pull_request' && format('beta.{0}', github.run_number) || '' }}

    # Resolve the ghul.compiler version that bootstraps this build.
    #
    # On a pull request: the latest published version that is actually
    # downloadable from NuGet (skipping a release still propagating).
    # On a push to main (the release build): reuse the exact version the
    # merged PR's CI resolved, read from that run's artifact — so the
    # release is bootstrapped with the compiler it was tested with, and
    # a compiler published since the PR ran cannot break the release.
    #
    # The version is published as the `bootstrap-compiler-version`
    # artifact; on a release run that is the diagnostic record of what
    # compiled the release, for as long as the artifact is retained.
    - name: Determine bootstrap compiler version
      id: compiler_version
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        resolve_latest() {
          local versions v
          versions=$(curl -fsSL https://api.nuget.org/v3-flatcontainer/ghul.compiler/index.json \
            | python3 -c "import sys, json; print('\n'.join(reversed(json.load(sys.stdin)['versions'])))")
          for v in ${versions}; do
            case "${v}" in *-*) continue ;; esac
            # Skip versions unlisted on nuget.org (e.g. a withdrawn or
            # mis-numbered release). Unlisted versions remain in the
            # flat-container index and stay downloadable, so without this check
            # the resolver would keep selecting the highest such version forever.
            curl -fsSL --compressed "https://api.nuget.org/v3/registration5-gz-semver2/ghul.compiler/${v}.json" \
              | python3 -c "import sys, json; sys.exit(0 if json.load(sys.stdin).get('listed') else 1)" || continue
            if curl -fsI "https://api.nuget.org/v3-flatcontainer/ghul.compiler/${v}/ghul.compiler.${v}.nupkg" >/dev/null 2>&1; then
              printf '%s' "${v}"
              return 0
            fi
          done
          echo "no downloadable ghul.compiler version found" >&2
          return 1
        }

        compiler=""
        if [ "${{ github.event_name }}" = "push" ]; then
          # Release build: carry the version the merged PR's CI resolved.
          pr=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                 --jq 'first(.[].number) // empty' 2>/dev/null || true)
          if [ -n "${pr}" ]; then
            head=$(gh api "repos/${{ github.repository }}/pulls/${pr}" --jq '.head.sha' 2>/dev/null || true)
            run=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${head}&event=pull_request&status=success" \
                    --jq 'first(.workflow_runs[].id) // empty' 2>/dev/null || true)
            if [ -n "${run}" ] && gh run download "${run}" -n bootstrap-compiler-version -D carried 2>/dev/null; then
              compiler=$(tr -d '[:space:]' < carried/bootstrap-compiler-version.txt)
            fi
          fi
          if [ -z "${compiler}" ]; then
            echo "::warning::could not carry the bootstrap compiler version from PR #${pr:-unknown}; re-resolving latest"
            compiler=$(resolve_latest)
          fi
        else
          compiler=$(resolve_latest)
        fi

        echo "compiler=${compiler}" >> "$GITHUB_OUTPUT"
        echo "Bootstrap compiler: ${compiler}"
        echo "Bootstrap compiler: \`${compiler}\`" >> "$GITHUB_STEP_SUMMARY"
        mkdir -p artifact
        printf '%s\n' "${compiler}" > artifact/bootstrap-compiler-version.txt

    - name: Upload bootstrap compiler version
      uses: actions/upload-artifact@v7
      with:
        name: bootstrap-compiler-version
        path: artifact/bootstrap-compiler-version.txt


  unit_tests:
    name: Run unit tests
    needs: [version]
    runs-on: ubicloud-standard-2

    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/.config/dotnet-tools.json

    - name: Add GHCR package source
      run: dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/degory/index.json"

    - name: Restore local .NET tools
      run: dotnet tool restore

    - name: Install the bootstrap compiler
      run: |
        for attempt in 1 2 3 4 5; do
          if dotnet tool update --local ghul.compiler --version ${{ needs.version.outputs.compiler }}; then
            exit 0
          fi
          echo "install attempt ${attempt} failed; retrying in 15s..."
          sleep 15
        done
        exit 1

    - name: Set build number
      run: |
        echo "namespace Source is class BUILD is number: string static => \"${{ needs.version.outputs.tag }}\"; si si" >src/source/build.ghul

    - name: Run unit tests
      run: dotnet test unit-tests

  bootstrap:
    name: Bootstrap compiler
    needs: [version]
    # Single-thread-bound: the ghul compiler doesn't parallelise the source
    # walk, and the 4 bootstrap passes are sequential. 2 vCPU is enough for
    # dotnet pack/install/clean alongside one compiler pass.
    runs-on: ubicloud-standard-2

    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/.config/dotnet-tools.json

    - name: Add GHCR package source
      run: dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/degory/index.json"

    - name: Restore local .NET tools
      run: dotnet tool restore

    - name: Install the bootstrap compiler
      run: |
        for attempt in 1 2 3 4 5; do
          if dotnet tool update --local ghul.compiler --version ${{ needs.version.outputs.compiler }}; then
            exit 0
          fi
          echo "install attempt ${attempt} failed; retrying in 15s..."
          sleep 15
        done
        exit 1

    - name: Bootstrap compiler
      run: ./build/bootstrap.sh
      env:
        TAG_VERSION: ${{ needs.version.outputs.tag }}
        PACKAGE_VERSION: ${{ needs.version.outputs.package }}

    - uses: actions/upload-artifact@v7
      with:
        name: ghul-compiler-package
        path: ./nupkg/ghul.compiler.${{ needs.version.outputs.package }}.nupkg

    # Separate artefact for consumers that need to spawn the bootstrapped
    # compiler as a process (e.g. analysis_tests). The whole tool tree is
    # required, not just ghul.dll: the .NET host needs ghul.runtimeconfig.json
    # / ghul.deps.json beside the dll, and the compiler needs sibling
    # assemblies (ghul-runtime, System.IO.Abstractions, ...), the bundled
    # stdlib under lib/dotnet/ghul/, the IL templates under lib/dotnet/il/,
    # and the native ilasm under runtimes/. Extracted here once because
    # bootstrap.sh's trailing `dotnet clean` wipes bin/.
    - name: Extract bootstrapped tool tree
      run: |
        unzip -o nupkg/ghul.compiler.${{ needs.version.outputs.package }}.nupkg \
          'tools/net10.0/any/*' -d extracted-tool

    - uses: actions/upload-artifact@v7
      with:
        name: ghul-compiler-tool
        path: ./extracted-tool/tools/net10.0/any

    # The analysis protocol client library ships as its own package so
    # out-of-repo tools can drive the compiler's analysis mode. Packed with
    # the same version as the compiler built from this commit.
    - name: Pack analysis protocol library
      run: dotnet pack analysis-protocol/analysis-protocol.ghulproj -nologo -p:CI=true -p:Version=${{ needs.version.outputs.package }}

    - uses: actions/upload-artifact@v7
      with:
        name: ghul-analysis-protocol-package
        path: ./analysis-protocol/nupkg/ghul.analysis.protocol.${{ needs.version.outputs.package }}.nupkg

  integration_tests:
    needs: [version, bootstrap]
    name: Run integration tests

    # The ghul-test harness spawns cpu*3/2 worker processes for >6 cores
    # (test-queue.ghul:38-52), each running dotnet ghul-compiler. 16 vCPU
    # → 24 parallel workers, the headline parallel-throughput win.
    runs-on: ubicloud-standard-16

    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/.config/dotnet-tools.json

    - name: Download ghul.compiler package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Download bootstrap compiler tool tree
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-tool
        path: bootstrap-tool

    - name: Uninstall ghul.compiler
      if: ${{ github.actor == 'dependabot[bot]' }}
      run: dotnet tool uninstall ghul.compiler

    - name: Add GHCR package source
      run: dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/degory/index.json"

    - name: Install ghul.compiler
      run: dotnet tool update --local ghul.compiler --version ${{ needs.version.outputs.package }} --add-source nupkg

    - name: Restore local .NET tools
      run: dotnet tool restore

    # Pin the runtime DLL the compiled test binaries link against to the
    # one the bootstrapped compiler ships with, not whatever runtime
    # ghul.test was packaged with. Without this, an integration test
    # that uses a runtime feature added since the ghul.test publish
    # would fail to resolve the symbol — because ghul-test in CI mode
    # otherwise picks the runtime DLL sitting next to its own binary.
    # GHUL_RUNTIME_DLL was added in ghul-test 1.3.7 (degory/ghul-test#108).
    - name: Run integration tests
      env:
        GHUL_RUNTIME_DLL: ${{ github.workspace }}/bootstrap-tool/ghul-runtime.dll
      run: bash -c "set -o pipefail ; dotnet ghul-test integration-tests | tee test-results.txt"

    - uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: test-results.txt

  analysis_tests:
    needs: [version, bootstrap]
    name: Run analysis tests

    # xunit-parallelised; each test spawns the bootstrapped compiler as an
    # analysis-mode subprocess and chats over IPC. Measured: 8 vCPU → 42s,
    # 16 vCPU → 44s. The bottleneck is per-test compiler-subprocess IPC, not
    # core count; bumping past 8 yields no wall-time win, so 8 it is. If this
    # job's wall time becomes painful, the lever is xunit's parallelism
    # settings / the harness, not the runner SKU.
    runs-on: ubicloud-standard-8

    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/.config/dotnet-tools.json

    - name: Download bootstrap compiler tool tree
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-tool
        path: bootstrap-tool

    - name: Download ghul.compiler package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Add GHCR package source
      run: dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/degory/index.json"

    # Build the test runner with the freshly-built compiler — the same one the
    # tests spawn as the compiler under test (the bootstrapped artefact's
    # ghul.dll, via ANALYSIS_TESTS_COMPILER_DLL). Building the harness with the
    # compiler it validates means a breaking language change that invalidates
    # the harness source fails here in its own PR, rather than landing latently
    # and breaking the next PR once the new compiler publishes.
    - name: Restore local .NET tools
      run: dotnet tool restore

    - name: Install the freshly-built compiler
      run: dotnet tool update --local ghul.compiler --version ${{ needs.version.outputs.package }} --add-source nupkg

    - name: Run analysis tests
      env:
        ANALYSIS_TESTS_COMPILER_DLL: ${{ github.workspace }}/bootstrap-tool/ghul.dll
      run: dotnet test analysis-tests -p:SkipCompilerProjectRef=true

  project_tests:
    needs: [version, bootstrap]
    name: Run project tests

    # ghul-test harness runs each .ghulproj in parallel and each `dotnet
    # build` is itself multithreaded. In practice the suite is small enough
    # that the work step finishes in ~5s on 4 vCPU; sized accordingly.
    runs-on: ubicloud-standard-4

    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/.config/dotnet-tools.json

    - name: Download ghul.compiler package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Add GHCR package source
      run: dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/degory/index.json"

    - name: Install ghul.compiler
      run: dotnet tool update --local ghul.compiler --version ${{ needs.version.outputs.package }} --add-source nupkg

    - name: Restore local .NET tools
      run: dotnet tool restore

    - name: Run project tests
      run: bash -c "set -o pipefail ; dotnet ghul-test --use-dotnet-build project-tests | tee project-test-results.txt"

    - uses: actions/upload-artifact@v7
      with:
        name: project-test-results
        path: project-test-results.txt

  runtime_tests:
    needs: [version, bootstrap]
    name: Run runtime tests

    runs-on: ubicloud-standard-2

    timeout-minutes: 10

    # Build ghul-runtime (latest main, no version pin) against the
    # bootstrapped compiler and run its unit tests. Same symmetry
    # contract as examples_tests: the new compiler must build current
    # ghul-runtime main, and current ghul-runtime main must build
    # under the previously-published compiler. Catches source-compat
    # regressions in the runtime before they require a runtime fix to
    # unstick — e.g. an inference change that silently breaks the
    # runtime test source.
    steps:
    # Pick `next` over `main` when it exists and is strictly ahead.
    # See docs/claude/breaking-change-coordination.md.
    - name: Resolve ghul-runtime ref
      id: ref
      shell: bash
      run: |
        set -euo pipefail
        repo=degory/ghul-runtime
        main_sha=$(git ls-remote "https://github.com/${repo}" refs/heads/main | cut -f1)
        next_sha=$(git ls-remote "https://github.com/${repo}" refs/heads/next | cut -f1 || true)
        ref=main
        if [ -n "${next_sha}" ] && [ "${next_sha}" != "${main_sha}" ]; then
          tmp=$(mktemp -d) && trap "rm -rf '${tmp}'" EXIT
          git clone --quiet --filter=blob:none --no-checkout --branch=next --depth=200 "https://github.com/${repo}" "${tmp}"
          git -C "${tmp}" fetch --quiet --depth=200 origin main:refs/remotes/origin/main
          if git -C "${tmp}" merge-base --is-ancestor origin/main next; then
            ref=next
            echo "using ${repo}/next"
          fi
        fi
        echo "ref=${ref}" >> "$GITHUB_OUTPUT"

    - name: Checkout ghul-runtime
      uses: actions/checkout@v6
      with:
        repository: degory/ghul-runtime
        path: ghul-runtime
        ref: ${{ steps.ref.outputs.ref }}

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/.config/dotnet-tools.json

    - name: Download ghul.compiler package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Install bootstrapped ghul.compiler in ghul-runtime
      working-directory: ghul-runtime
      run: dotnet tool update --local ghul.compiler --version ${{ needs.version.outputs.package }} --add-source ../nupkg

    - name: Add GHCR package source
      working-directory: ghul-runtime
      run: dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/degory/index.json"

    - name: Restore local .NET tools
      working-directory: ghul-runtime
      run: dotnet tool restore

    - name: Build ghul-runtime
      working-directory: ghul-runtime
      run: dotnet build

    - name: Run ghul-runtime unit tests
      working-directory: ghul-runtime
      run: dotnet test tests/tests.ghulproj

  examples_tests:
    needs: [version, bootstrap]
    name: Run examples tests

    runs-on: ubicloud-standard-4

    timeout-minutes: 10

    # Build ghul-examples (latest main, no version pin) against the
    # bootstrapped compiler. ghul-examples has its own CI gating its
    # main, and the language is generally backwards-compatible, so the
    # contract is symmetric: the new compiler must build current
    # ghul-examples main, and current main ghul-examples must build
    # under the previously-published compiler. This job enforces the
    # first half. Runs on both PR and main push: it gates
    # publish_release_package, so a skipped run would silently block
    # publish on the post-merge run.
    steps:
    # Pick `next` over `main` when it exists and is strictly ahead.
    # See docs/claude/breaking-change-coordination.md.
    - name: Resolve ghul-examples ref
      id: ref
      shell: bash
      run: |
        set -euo pipefail
        repo=degory/ghul-examples
        main_sha=$(git ls-remote "https://github.com/${repo}" refs/heads/main | cut -f1)
        next_sha=$(git ls-remote "https://github.com/${repo}" refs/heads/next | cut -f1 || true)
        ref=main
        if [ -n "${next_sha}" ] && [ "${next_sha}" != "${main_sha}" ]; then
          tmp=$(mktemp -d) && trap "rm -rf '${tmp}'" EXIT
          git clone --quiet --filter=blob:none --no-checkout --branch=next --depth=200 "https://github.com/${repo}" "${tmp}"
          git -C "${tmp}" fetch --quiet --depth=200 origin main:refs/remotes/origin/main
          if git -C "${tmp}" merge-base --is-ancestor origin/main next; then
            ref=next
            echo "using ${repo}/next"
          fi
        fi
        echo "ref=${ref}" >> "$GITHUB_OUTPUT"

    - name: Checkout ghul-examples
      uses: actions/checkout@v6
      with:
        repository: degory/ghul-examples
        path: ghul-examples
        ref: ${{ steps.ref.outputs.ref }}

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/Directory.Packages.props
          **/.config/dotnet-tools.json

    - name: Download ghul.compiler package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Install bootstrapped ghul.compiler in ghul-examples
      working-directory: ghul-examples
      run: dotnet tool update --local ghul.compiler --version ${{ needs.version.outputs.package }} --add-source ../nupkg

    - name: Add GHCR package source
      working-directory: ghul-examples
      run: dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/degory/index.json"

    - name: Restore local .NET tools
      working-directory: ghul-examples
      run: dotnet tool restore

    - name: Build examples
      working-directory: ghul-examples
      run: dotnet build

    - name: Run examples integration tests
      working-directory: ghul-examples
      run: dotnet ghul-test --use-dotnet-build integration-tests

  code_review:
    name: Code review
    if: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: degory/ghul-code-review/.github/workflows/review.yml@v1
    with:
      model: ${{ vars.CLAUDE_REVIEW_MODEL || 'claude-opus-4-8' }}
      idle-timeout-seconds: ${{ fromJSON(vars.CLAUDE_REVIEW_IDLE_TIMEOUT_SECONDS || '90') }}
      max-attempts: ${{ fromJSON(vars.CLAUDE_REVIEW_MAX_ATTEMPTS || '3') }}
      gh-app-id: ${{ vars.GHUL_REVIEWER_APP_ID }}
      prompt: |
        Review pull request #${{ github.event.pull_request.number }} on ${{ github.repository }}.

        You run in parallel with CI. Whether the diff parses, compiles, and passes tests is gated by CI and GitHub branch protection before merge — that's not your job. Trust the diff as written; don't try to mentally compile, run tests, or verify self-hosting.

        Read these files first, in order:
        1. .github/claude-review.md — how to operate, severity bar, what to flag
        2. AGENTS.md — test requirements and the type-system change protocol
        3. GHUL.md — ghūl language reference (consult as needed while reading the diff)

        The PR branch is already checked out. Useful commands:
        - `gh pr diff ${{ github.event.pull_request.number }}` — the diff
        - `gh pr view ${{ github.event.pull_request.number }} --json title,body` — PR title and description

        Post findings only to GitHub per the brief. Do not put review text in chat messages.
    secrets:
      claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      gh-app-private-key: ${{ secrets.GHUL_REVIEWER_PRIVATE_KEY }}

  publish_beta_package:
    needs: [version, unit_tests, analysis_tests, integration_tests, project_tests, runtime_tests, examples_tests]
    name: Publish beta package

    timeout-minutes: 5

    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}
    steps:
    - uses: actions/checkout@v6

    - name: Download ghul compiler tool package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Download analysis protocol package
      uses: actions/download-artifact@v8
      with:
        name: ghul-analysis-protocol-package
        path: nupkg

    - name: Publish beta package to GitHub
      run: dotnet nuget push ./nupkg/ghul.compiler.${{ needs.version.outputs.package }}.nupkg -k ${GITHUB_TOKEN} -s https://nuget.pkg.github.com/degory/index.json --skip-duplicate --no-symbols
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish analysis protocol beta package to GitHub
      run: dotnet nuget push ./nupkg/ghul.analysis.protocol.${{ needs.version.outputs.package }}.nupkg -k ${GITHUB_TOKEN} -s https://nuget.pkg.github.com/degory/index.json --skip-duplicate --no-symbols
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release_package:
    needs: [version, unit_tests, analysis_tests, integration_tests, project_tests, runtime_tests, examples_tests]
    name: Publish release package

    timeout-minutes: 5

    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'pull_request' }}

    steps:
    - uses: actions/checkout@v6

    - name: Download ghul compiler tool package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Download analysis protocol package
      uses: actions/download-artifact@v8
      with:
        name: ghul-analysis-protocol-package
        path: nupkg

    - name: Publish release package to GitHub
      run: dotnet nuget push ./nupkg/ghul.compiler.${{ needs.version.outputs.package }}.nupkg -k ${GITHUB_TOKEN} -s https://nuget.pkg.github.com/degory/index.json --skip-duplicate --no-symbols
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish release package to NuGet
      run: dotnet nuget push ./nupkg/ghul.compiler.${{ needs.version.outputs.package }}.nupkg -k ${NUGET_TOKEN} -s https://api.nuget.org/v3/index.json --skip-duplicate --no-symbols
      env:
        NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}

    - name: Publish analysis protocol release package to GitHub
      run: dotnet nuget push ./nupkg/ghul.analysis.protocol.${{ needs.version.outputs.package }}.nupkg -k ${GITHUB_TOKEN} -s https://nuget.pkg.github.com/degory/index.json --skip-duplicate --no-symbols
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish analysis protocol release package to NuGet
      run: dotnet nuget push ./nupkg/ghul.analysis.protocol.${{ needs.version.outputs.package }}.nupkg -k ${NUGET_TOKEN} -s https://api.nuget.org/v3/index.json --skip-duplicate --no-symbols
      env:
        NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}

  create_release:
    needs: [version, integration_tests, publish_release_package]
    name: Create release
    runs-on: ubuntu-latest

    timeout-minutes: 5
    if: ${{ github.event_name != 'pull_request' }}

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: '0'

    - name: Download ghul compiler tool package
      uses: actions/download-artifact@v8
      with:
        name: ghul-compiler-package
        path: nupkg

    - name: Create changelog
      run: git log -1 --format="%s%n%n%b%n%n" >changelog.txt

    - name: Create a release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ needs.version.outputs.tag }}" \
          ./nupkg/ghul.compiler.${{ needs.version.outputs.package }}.nupkg \
          --title "${{ needs.version.outputs.tag }}" \
          --notes-file changelog.txt
