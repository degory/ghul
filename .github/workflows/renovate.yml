# Keeps the pinned ghūl package versions current in the repositories that other
# people start from - the .NET templates and the repository template. Both had
# drifted years behind, so a newcomer following them built against an old
# compiler and an old runtime.
#
# One instance updates every repository it is configured with, so this runs
# here rather than in each of them: one schedule, one configuration, and one
# place to look when an expected update does not appear. The repository list is
# in .github/renovate-global.json5.
#
# It runs as the ghul-coder app rather than with GITHUB_TOKEN. A push made with
# GITHUB_TOKEN does not start another workflow run, so an update merged that
# way would sit on main and never be released; a push made by an app does start
# one, and the target repository publishes as usual.

name: Renovate

on:
  schedule:
    # daily, off the hour: scheduled workflows are queued at busy times
    - cron: '17 3 * * *'

  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Log what would change without opening pull requests'
        type: boolean
        default: false
      log-level:
        description: 'Renovate log level'
        type: choice
        options: [info, debug]
        default: info

# A second run while one is in flight would work from the same branches
concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Update dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Everything is done with the app token below; the workflow's own token
    # needs nothing beyond reading this repository for the configuration file.
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Create an app installation token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        # the app id identifies the app and is not a secret; only the private
        # key is, and it is held in this repository alone
        app-id: '3784377'
        private-key: ${{ secrets.GHUL_CODER_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: |
          ghul-templates
          ghul-repository-template

    - name: Renovate
      uses: renovatebot/github-action@v46.1.20
      with:
        token: ${{ steps.app-token.outputs.token }}
        configurationFile: .github/renovate-global.json5
      env:
        LOG_LEVEL: ${{ inputs.log-level || 'info' }}
        # unset when not a dry run: Renovate ignores an empty variable
        RENOVATE_DRY_RUN: ${{ inputs.dry-run && 'full' || '' }}
