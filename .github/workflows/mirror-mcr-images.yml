# Mirrors the official Microsoft .NET SDK container images into this
# account's GHCR namespace.
#
# CI jobs across the ghul repos run inside `container:` images and pull
# the .NET SDK for every job. Pulling straight from mcr.microsoft.com
# draws on a per-IP anonymous-pull budget that intermittently throttles
# and produces spurious CI failures. The GHCR copy is served from
# GitHub's own registry to GitHub-hosted runners and is not subject to
# that budget.
#
# The mirror is a verbatim, multi-arch copy of the upstream image; only
# the registry it is served from changes.
#
# One-time setup, after the first run creates the package:
#   set the ghcr.io/degory/dotnet-sdk package visibility to Public
#   (Account -> Packages -> dotnet-sdk -> Package settings -> Change
#   visibility). Public lets every repo pull it with no credentials,
#   including Dependabot PRs, which cannot read repository secrets.
#   Pushing later refreshes keeps the existing visibility.

name: Mirror MCR images

on:
  workflow_dispatch:
  schedule:
    # Weekly, Sunday 04:00 UTC. Microsoft publishes SDK patches roughly
    # monthly, so weekly keeps the mirror comfortably current.
    - cron: '0 4 * * 0'

jobs:
  mirror:
    name: Mirror .NET SDK image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    strategy:
      matrix:
        # The tags the ghul-repo workflows consume. 8.0 is Debian-based,
        # 8.0-jammy is Ubuntu 22.04 — kept distinct on purpose.
        tag: ['8.0', '8.0-jammy']

    steps:
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GHCR_PAT }}

    # imagetools copies the manifest registry-to-registry without
    # pulling layers onto the runner, preserving the full multi-arch
    # image index.
    - name: Mirror dotnet/sdk:${{ matrix.tag }}
      run: |
        docker buildx imagetools create \
          --tag ghcr.io/degory/dotnet-sdk:${{ matrix.tag }} \
          mcr.microsoft.com/dotnet/sdk:${{ matrix.tag }}

    - name: Verify mirrored image
      run: docker buildx imagetools inspect ghcr.io/degory/dotnet-sdk:${{ matrix.tag }}
